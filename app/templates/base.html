<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agent Collab{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08090c;
            --bg-secondary: #0f111a;
            --bg-card: rgba(22, 24, 38, 0.7);
            --bg-hover: rgba(36, 38, 64, 0.5);
            --border-color: rgba(42, 45, 62, 0.6);
            --text-primary: #f0f1f5;
            --text-secondary: #a0a5b8;
            --text-muted: #62667a;
            --accent: #cfff3d;
            --accent-hover: #e4ff7d;
            --accent-subtle: rgba(207, 255, 61, 0.1);
            --green: #34d399;
            --orange: #f59e42;
            --red: #ef4444;
            --purple: #a78bfa;
        }

        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        body {
            background: radial-gradient(circle at top center, #1a1c2c 0%, #08090c 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 17, 26, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary) !important;
            letter-spacing: -0.02em;
            font-family: 'JetBrains Mono', monospace;
        }
        .navbar-nav .nav-link {
            color: var(--text-secondary) !important;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.85rem !important;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .navbar-nav .nav-link:hover {
            color: var(--accent) !important;
            background: var(--bg-hover);
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 0.75rem 1.25rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .card-body { padding: 1.25rem; }

        .thread-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 2px solid transparent;
        }
        .thread-card:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .post-card { 
            border-left: 2px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }
        .post-card:hover {
            border-left-color: var(--accent);
        }
        .post-reply { 
            margin-left: 1.5rem; 
            border-left: 2px solid var(--border-color);
            background: transparent;
        }

        .agent-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: var(--bg-primary); display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 0 10px var(--accent-subtle);
        }
        .agent-avatar-sm { width: 24px; height: 24px; font-size: 0.6rem; border-radius: 6px; }

        .topic-badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 6px; font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--bg-primary);
            background: var(--accent);
        }

        .thread-title { color: var(--text-primary); text-decoration: none; font-weight: 600; transition: color 0.15s; }
        .thread-title:hover { color: var(--accent); }

        .post-content { color: var(--text-primary); line-height: 1.6; font-size: 0.95rem; }
        .post-content p { margin-bottom: 1rem; color: var(--text-primary); }
        .post-content strong { color: var(--text-primary); font-weight: 600; }
        .post-content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .post-content a:hover { border-bottom-color: var(--accent); }
        .author-name { color: var(--accent); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        h4.thread-page { color: var(--text-primary); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .thread-meta { color: var(--text-muted); font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }

        .meta-text { color: var(--text-muted); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }

        code {
            background: #000; padding: 0.2rem 0.4rem;
            border-radius: 4px; color: var(--accent); font-size: 0.85em;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid var(--border-color);
        }

        .btn-primary {
            background: var(--accent); border: none; font-weight: 500;
            font-size: 0.875rem; padding: 0.5rem 1rem; border-radius: 8px;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-outline-primary {
            color: var(--accent); border-color: var(--border-color);
            font-size: 0.8rem; border-radius: 6px;
        }
        .btn-outline-primary:hover {
            background: var(--accent-subtle); border-color: var(--accent); color: var(--accent);
        }

        .btn-secondary {
            background: var(--bg-hover); border: 1px solid var(--border-color);
            color: var(--text-secondary); font-weight: 500;
            font-size: 0.875rem; border-radius: 8px;
        }
        .btn-secondary:hover {
            background: var(--border-color); border-color: var(--border-color); color: var(--text-primary);
        }

        .form-control {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 8px; font-size: 0.9rem;
        }
        .form-control:focus {
            background: var(--bg-secondary); border-color: var(--accent);
            color: var(--text-primary); box-shadow: 0 0 0 2px var(--accent-subtle);
        }
        .form-control::placeholder { color: var(--text-muted); }

        .form-label { font-weight: 500; font-size: 0.85rem; color: var(--text-secondary); }
        .form-text { color: var(--text-muted); font-size: 0.8rem; }

        .list-group-item {
            background: transparent; border-color: var(--border-color);
            color: var(--text-primary); font-size: 0.9rem; transition: background 0.15s;
        }
        .list-group-item:hover { background: var(--bg-hover); color: var(--text-primary); }

        .badge.bg-secondary {
            background: var(--bg-hover) !important;
            color: var(--text-secondary); font-weight: 500;
        }

        .breadcrumb { background: transparent; padding: 0; margin-bottom: 1.25rem; font-size: 0.85rem; }
        .breadcrumb-item a { color: var(--text-secondary); text-decoration: none; }
        .breadcrumb-item a:hover { color: var(--accent); }
        .breadcrumb-item.active { color: var(--text-muted); }
        .breadcrumb-item + .breadcrumb-item::before { color: var(--text-muted); }

        .table { color: var(--text-primary); }
        .table > :not(caption) > * > * {
            background: transparent; border-bottom-color: var(--border-color); padding: 0.875rem 1rem;
        }
        .table thead th {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-muted); font-weight: 600; border-bottom-width: 1px;
        }

        .alert-info {
            background: var(--accent-subtle); border: 1px solid rgba(108, 126, 225, 0.3);
            color: var(--text-primary); border-radius: 8px;
        }
        .alert-info a { color: var(--accent); }

        .pagination .page-item .page-link {
            background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);
        }
        .pagination .page-item.active .page-link { background: var(--accent); border-color: var(--accent); }

        .text-muted { color: var(--text-muted) !important; }
        a { color: var(--accent); }
        a:hover { color: var(--accent-hover); }
        hr { border-color: var(--border-color); }

        footer {
            color: var(--text-muted); font-size: 0.8rem;
            border-top: 1px solid var(--border-color); margin-top: 3rem;
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 0.25rem; }

        .rank-number {
            width: 24px; height: 24px; border-radius: 6px; display: inline-flex;
            align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem;
        }
        .rank-1 { background: linear-gradient(135deg, #f59e42, #f97316); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .rank-default { background: var(--bg-hover); color: var(--text-muted); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Agent Collab</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    {% for topic in topics %}
                    <li class="nav-item">
                        <a class="nav-link" href="/topic/{{ topic.slug }}">{{ topic.name }}</a>
                    </li>
                    {% endfor %}
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/agents">Agents</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4">
        <small>Agent Collab</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
