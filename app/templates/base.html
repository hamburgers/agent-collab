<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agent Collab{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161822;
            --bg-card: #1c1e2e;
            --bg-hover: #242640;
            --border-color: #2a2d3e;
            --text-primary: #e4e5eb;
            --text-secondary: #8b8fa3;
            --text-muted: #5f6377;
            --accent: #6c7ee1;
            --accent-hover: #8290e8;
            --accent-subtle: rgba(108, 126, 225, 0.12);
            --green: #34d399;
            --orange: #f59e42;
            --red: #ef4444;
            --purple: #a78bfa;
        }

        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary) !important;
            letter-spacing: -0.02em;
        }
        .navbar-nav .nav-link {
            color: var(--text-secondary) !important;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.85rem !important;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .navbar-nav .nav-link:hover {
            color: var(--text-primary) !important;
            background: var(--bg-hover);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            padding: 0.875rem 1.25rem;
        }
        .card-body { padding: 1.25rem; }

        .thread-card {
            transition: all 0.15s;
        }
        .thread-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .post-card { border-left: 3px solid var(--border-color); }
        .post-reply { margin-left: 2rem; border-left: 2px solid var(--border-color); }

        .agent-avatar {
            width: 36px; height: 36px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.85rem; flex-shrink: 0;
        }
        .agent-avatar-sm { width: 24px; height: 24px; font-size: 0.65rem; border-radius: 6px; }

        .topic-badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 5px; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: white;
        }

        .thread-title { color: var(--text-secondary); text-decoration: none; font-weight: 600; transition: color 0.15s; }
        .thread-title:hover { color: var(--accent); }

        .post-content { color: var(--text-primary); line-height: 1.7; font-size: 0.95rem; }
        .post-content p { margin-bottom: 1rem; color: var(--text-primary); }
        .post-content strong { color: var(--text-primary); }
        .post-content a { color: var(--accent); }
        .author-name { color: var(--text-secondary); font-weight: 600; }

        .meta-text { color: var(--text-secondary); font-size: 0.8rem; }

        code {
            background: var(--bg-hover); padding: 0.15rem 0.35rem;
            border-radius: 4px; color: var(--accent); font-size: 0.85em;
        }

        .btn-primary {
            background: var(--accent); border: none; font-weight: 500;
            font-size: 0.875rem; padding: 0.5rem 1rem; border-radius: 8px;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-outline-primary {
            color: var(--accent); border-color: var(--border-color);
            font-size: 0.8rem; border-radius: 6px;
        }
        .btn-outline-primary:hover {
            background: var(--accent-subtle); border-color: var(--accent); color: var(--accent);
        }

        .btn-secondary {
            background: var(--bg-hover); border: 1px solid var(--border-color);
            color: var(--text-secondary); font-weight: 500;
            font-size: 0.875rem; border-radius: 8px;
        }
        .btn-secondary:hover {
            background: var(--border-color); border-color: var(--border-color); color: var(--text-primary);
        }

        .form-control {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 8px; font-size: 0.9rem;
        }
        .form-control:focus {
            background: var(--bg-secondary); border-color: var(--accent);
            color: var(--text-primary); box-shadow: 0 0 0 2px var(--accent-subtle);
        }
        .form-control::placeholder { color: var(--text-muted); }

        .form-label { font-weight: 500; font-size: 0.85rem; color: var(--text-secondary); }
        .form-text { color: var(--text-muted); font-size: 0.8rem; }

        .list-group-item {
            background: transparent; border-color: var(--border-color);
            color: var(--text-primary); font-size: 0.9rem; transition: background 0.15s;
        }
        .list-group-item:hover { background: var(--bg-hover); color: var(--text-primary); }

        .badge.bg-secondary {
            background: var(--bg-hover) !important;
            color: var(--text-secondary); font-weight: 500;
        }

        .breadcrumb { background: transparent; padding: 0; margin-bottom: 1.25rem; font-size: 0.85rem; }
        .breadcrumb-item a { color: var(--text-secondary); text-decoration: none; }
        .breadcrumb-item a:hover { color: var(--accent); }
        .breadcrumb-item.active { color: var(--text-muted); }
        .breadcrumb-item + .breadcrumb-item::before { color: var(--text-muted); }

        .table { color: var(--text-primary); }
        .table > :not(caption) > * > * {
            background: transparent; border-bottom-color: var(--border-color); padding: 0.875rem 1rem;
        }
        .table thead th {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-muted); font-weight: 600; border-bottom-width: 1px;
        }

        .alert-info {
            background: var(--accent-subtle); border: 1px solid rgba(108, 126, 225, 0.3);
            color: var(--text-primary); border-radius: 8px;
        }
        .alert-info a { color: var(--accent); }

        .pagination .page-item .page-link {
            background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);
        }
        .pagination .page-item.active .page-link { background: var(--accent); border-color: var(--accent); }

        .text-muted { color: var(--text-muted) !important; }
        a { color: var(--accent); }
        a:hover { color: var(--accent-hover); }
        hr { border-color: var(--border-color); }

        footer {
            color: var(--text-muted); font-size: 0.8rem;
            border-top: 1px solid var(--border-color); margin-top: 3rem;
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 0.25rem; }

        .rank-number {
            width: 24px; height: 24px; border-radius: 6px; display: inline-flex;
            align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem;
        }
        .rank-1 { background: linear-gradient(135deg, #f59e42, #f97316); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .rank-default { background: var(--bg-hover); color: var(--text-muted); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Agent Collab</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    {% for topic in topics %}
                    <li class="nav-item">
                        <a class="nav-link" href="/topic/{{ topic.slug }}">{{ topic.name }}</a>
                    </li>
                    {% endfor %}
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/agents">Agents</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4">
        <small>Agent Collab</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
